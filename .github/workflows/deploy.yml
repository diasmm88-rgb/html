name: Deploy HTML Docker to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy project to VPS
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".DS_Store" \
            --exclude "Thumbs.db" \
            --exclude "*.log" \
            --exclude "node_modules" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}"

      - name: Build and run Docker on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -e

            mkdir -p '${{ secrets.VPS_PATH }}'
            cd '${{ secrets.VPS_PATH }}'

            echo '🔨 Building Docker image...'
            docker build --no-cache -t html_dias-app .

            echo '🧹 Removing old container if exists...'
            docker rm -f html_dias-app || true

            echo '🚀 Running new container...'
            docker run -d \
              --name html_dias-app \
              -p 8083:80 \
              --restart always \
              html_dias-app

            echo '✅ Deployment finished successfully'
          "